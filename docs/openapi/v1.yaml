openapi: 3.0.3
info:
  title: VPS API
  version: "1.0.0"
  description: |
    HTTP API маркетплейса (прокси Firestore + Resend). Префикс `/api/v1/`.
    Ошибки в формате `error.code`, `error.message`, `error.request_id`.
    Заголовок `X-Request-Id` на ответах (и опционально на запросах).
servers:
  - url: https://{host}
    variables:
      host:
        default: api.example.com
paths:
  /health:
    get:
      summary: Liveness
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/health:
    get:
      summary: Liveness (версионированный путь)
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/quote-request:
    post:
      summary: Запрос коммерческого предложения (email через Resend)
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/XAppSecret"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, providerName]
              properties:
                email:
                  type: string
                  format: email
                providerName:
                  type: string
                tariffName:
                  type: string
      responses:
        "200":
          description: Письмо поставлено в очередь Resend
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /api/v1/catalog:
    get:
      summary: Каталог провайдеров, тарифов и отзывов
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Каталог
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/providers/{providerId}/reviews:
    parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: string
      - $ref: "#/components/parameters/XRequestId"
    get:
      summary: Список отзывов провайдера
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Отзывы
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Error"
    post:
      summary: Добавить отзыв
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/me/support/messages:
    parameters:
      - $ref: "#/components/parameters/XRequestId"
    get:
      summary: Сообщения чата поддержки
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Сообщения
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Error"
    post:
      summary: Отправить сообщение (и авто-ответ бота)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                imageUrl:
                  type: string
      responses:
        "200":
          description: OK
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/sync:
    get:
      summary: Настройки и избранное
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Sync payload
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/sync/settings:
    put:
      summary: Обновить настройки синхронизации
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [themeMode]
              properties:
                themeMode:
                  type: string
                  enum: [light, dark, system]
                offerEmail:
                  type: string
      responses:
        "200":
          description: OK
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me/sync/favorites:
    put:
      summary: Обновить избранное
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                favProviderIds:
                  type: array
                  items:
                    type: string
                favTariffKeys:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/orders:
    post:
      summary: Создать заказ (статус pending_payment)
      description: Требуется Firebase ID token. Заказ сохраняется в Firestore только на сервере.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerId, tariffId, email]
              properties:
                providerId:
                  type: string
                tariffId:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Идентификатор заказа
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: pending_payment
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/orders/{orderId}:
    get:
      summary: Статус заказа (владелец по userId из токена)
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Заказ (email замаскирован)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  providerId:
                    type: string
                  tariffId:
                    type: string
                  clientEmailMasked:
                    type: string
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                  provisionQueuedAt:
                    type: string
                    nullable: true
                  errorCode:
                    type: string
                    nullable: true
                  errorMessage:
                    type: string
                    nullable: true
                  subscriptionIdSuffix:
                    type: string
                    nullable: true
                    description: Последние символы subscription id (без полного id)
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/admin/orders:
    get:
      summary: Список заказов (минимальная админка)
      description: Заголовок X-Admin-Secret; только серверный секрет, не для приложения.
      parameters:
        - $ref: "#/components/parameters/XAdminSecret"
        - $ref: "#/components/parameters/XRequestId"
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/admin/metrics:
    get:
      summary: Счётчики заказов по статусам
      parameters:
        - $ref: "#/components/parameters/XAdminSecret"
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Агрегаты
          content:
            application/json:
              schema:
                type: object
                properties:
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  ts:
                    type: string
        "401":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/admin/orders/{orderId}/retry-provision:
    post:
      summary: Вернуть failed заказ в очередь провижнинга (paid + provisionQueuedAt)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XAdminSecret"
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: string
                  queued:
                    type: boolean
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/webhooks/payment:
    post:
      summary: Внутренний тестовый webhook оплаты (MVP)
      description: |
        Без Firebase Bearer. Защита заголовком `X-Webhook-Secret` (секрет сервера).
        Идемпотентность по `event_id`. Не заменяет подпись реальной платёжной системы.
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - name: X-Webhook-Secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id, order_id]
              properties:
                event_id:
                  type: string
                  description: Уникальный идентификатор события (идемпотентность)
                order_id:
                  type: string
                paid:
                  type: boolean
                status:
                  type: string
                  description: Например paid или succeeded
                payment_status:
                  type: string
      responses:
        "200":
          description: Обработано или дубликат события
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  idempotent:
                    type: boolean
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
components:
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Корреляция с логами; если нет — сервер сгенерирует UUID.
    XAppSecret:
      name: X-App-Secret
      in: header
      required: false
      schema:
        type: string
      description: Обязателен, если на сервере задан APP_REQUEST_SECRET.
    XAdminSecret:
      name: X-Admin-Secret
      in: header
      required: true
      schema:
        type: string
      description: Должен совпадать с ADMIN_API_SECRET на сервере.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token
  responses:
    Error:
      description: Структурированная ошибка
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [code, message, request_id]
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  request_id:
                    type: string
